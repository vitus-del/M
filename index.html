<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة التخمين</title>
    <style>
        :root {
            --bg: #1A1A2E;
            --accent: #6A0DAD;
            --play: #FF7F11;
            --text: #EAEAEA;
        }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .group { border: 2px solid var(--accent); padding: 15px; margin: 15px auto; border-radius: 12px; max-width: 400px; }
        button { background-color: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; }
        .play-btn { background-color: var(--play); font-size: 1.2em; padding: 15px 40px; border-radius: 50px; }
        img { max-width: 100px; height: 100px; object-fit: cover; margin: 5px; border-radius: 5px; }
        #gameScreen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:1000; }
    </style>
</head>
<body>

    <h1>🎮 لعبة التخمين</h1>
    <button onclick="addGroup()">+ إضافة مجموعة جديدة</button>
    <button class="play-btn" onclick="playRandom()">ابدأ اللعبة</button>
    
    <div id="groupsContainer"></div>

    <div id="gameScreen">
        <h2 id="imgName">تخمين الصورة!</h2>
        <img id="displayImg" src="" style="max-width:90%; height:auto; max-height:60%;">
        <button onclick="closeGame()" style="background:red;">تم (الرجوع)</button>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('myGameData')) || {};

        function addGroup() {
            let name = prompt("اسم المجموعة:");
            if (name) { data[name] = []; saveAndRender(); }
        }

        function addImage(groupName) {
            let input = document.createElement('input');
            input.type = 'file'; input.multiple = true;
            input.onchange = e => {
                for (let file of e.target.files) {
                    let reader = new FileReader();
                    reader.onload = event => {
                        data[groupName].push(event.target.result);
                        saveAndRender();
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function playRandom() {
            let allImages = [];
            for (let group in data) { allImages = allImages.concat(data[group]); }
            if (allImages.length === 0) { alert("أضف صوراً أولاً!"); return; }
            let randomImg = allImages[Math.floor(Math.random() * allImages.length)];
            document.getElementById('displayImg').src = randomImg;
            document.getElementById('gameScreen').style.display = 'flex';
        }

        function closeGame() { document.getElementById('gameScreen').style.display = 'none'; }

        function saveAndRender() {
            localStorage.setItem('myGameData', JSON.stringify(data));
            let container = document.getElementById('groupsContainer');
            container.innerHTML = '';
            for (let group in data) {
                let div = document.createElement('div');
                div.className = 'group';
                div.innerHTML = `<h3>${group}</h3>
                    <button onclick="addImage('${group}')">إضافة صورة</button>
                    <div>${data[group].map(img => `<img src="${img}">`).join('')}</div>`;
                container.appendChild(div);
            }
        }
        saveAndRender();
    </script>
</body>
</html>
